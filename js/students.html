<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление учениками</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Управление учениками</h1>
            <div>
                <a href="dashboard.html">Назад</a>
                <button id="logout-button">Выйти</button>
            </div>
        </header>

        <form id="create-student-form">
            <h2>Создать нового ученика</h2>
            <input type="text" id="student-name" placeholder="Имя ученика" required>
            <input type="text" id="student-login" placeholder="Логин" required>
            <input type="text" id="student-password" placeholder="Пароль" required>
            <button type="submit">Создать</button>
        </form>

        <table id="students-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Логин</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
